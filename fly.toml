# fly.toml app configuration file generated for serrch on 2026-06-26T12:06:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'serrch'
primary_region = 'jnb'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
